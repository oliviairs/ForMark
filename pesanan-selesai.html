<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesanan Selesai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.order-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:13px 0; border-bottom:1px solid var(--line); cursor:pointer;
}
.order-row:last-of-type { border-bottom:none; }
.order-row:hover .order-title { color:var(--terracotta-dark); }
.order-id { font-family:'Fraunces',serif; font-size:11px; color:var(--terracotta-dark); margin-bottom:2px; }
.order-title { font-size:13px; font-weight:500; }
.order-meta { font-size:12px; color:var(--ink-soft); margin-top:2px; }
.badge { font-size:11px; padding:4px 11px; border-radius:20px; font-weight:500; white-space:nowrap; }
.badge-done { background:#E3E8ED; color:#3D5A73; }
.section-divider { font-size:11px; color:var(--ink-soft); font-weight:600; letter-spacing:.5px; text-transform:uppercase; padding:12px 0 8px; border-bottom:1px solid var(--line); margin-bottom:2px; }
.order-thumb {
  width:42px; height:42px; border-radius:4px; object-fit:cover; flex-shrink:0;
}
.order-left { display:flex; align-items:center; gap:12px; }
.empty-state { text-align:center; padding:30px 0; font-size:13px; color:var(--ink-soft); }
</style>
</head>
<body>

<header>
<nav>
  <div class="nav-inner">
    <a href="dashboard-artist.html" class="logo-brand"><img src="logofm.png" alt="ForMark" class="logo-avatar"><span class="logo-name">ForMark</span></a>
        <ul class="navlinks">
      <li><a href="dashboard-artist.html">Dashboard</a></li>
      <li><a href="pesanan-selesai.html" class="active">Pesanan</a></li>
    </ul>
    <a class="navcta" href="login-artist.html">Keluar</a>
  </div>
</nav>
</header>

<div class="device-page" style="max-width:500px;">
  <div class="screen-label">Pesanan selesai</div>
  <div class="device">
    <div class="device-bar"><span></span><span></span><span></span></div>
    <div class="device-body">

      <div style="margin-bottom:14px;">
        <div style="font-size:15px;font-weight:600;">Riwayat pesanan selesai</div>
        <div style="font-size:12px;color:var(--ink-soft);margin-top:2px;">Klik pesanan untuk lihat detail</div>
      </div>

      <div class="section-divider">Selesai</div>

      <a href="pesanan-selesai-detail1.html" style="text-decoration:none;color:inherit;">
        <div class="order-row">
          <div class="order-left">
            <img class="order-thumb" src="simple.jpg" alt="hasil order 002">
            <div>
              <div class="order-id">ORDER #002</div>
              <div class="order-title">Simple Logo</div>
              <div class="order-meta">Pelanggan: <span id="namaPelanggan"></span> · Rp200.000</div>
            </div>
          </div>
          <span class="badge badge-done">Selesai</span>
        </div>
      </a>

      <a href="pesanan-selesai-detail2.html" style="text-decoration:none;color:inherit;">
        <div class="order-row">
          <div class="order-left">
            <img class="order-thumb" src="kit.jpg" alt="hasil order 005">
            <div>
              <div class="order-id">ORDER #005</div>
              <div class="order-title">Full Branding Kit</div>
              <div class="order-meta">Pelanggan: Arya · Rp600.000</div>
            </div>
          </div>
          <span class="badge badge-done">Selesai</span>
        </div>
      </a>

    </div>
  </div>
</div>

<footer>
  <div class="wrap">&copy; 2026 ForMark. All rights reserved.</div>
</footer>
<script>
const nama = localStorage.getItem("nama");

document.getElementById("namaPelanggan").textContent =
    nama ? nama : "Siska";
</script>
</body>
</html>
