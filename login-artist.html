<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk Desainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo-brand"><img src="logofm.png" alt="ForMark" class="logo-avatar"><span class="logo-name">ForMark</span></a>
    <ul class="navlinks"></ul>
    <a class="navcta" href="login-artist.html">Masuk</a>
  </div>
</nav>
</header>

<div class="device-page">
  <div class="screen-label">Login desainer</div>
  <div class="device">
    <div class="device-bar"><span></span><span></span><span></span></div>
    <div class="device-body">
      <div class="login-box">
        <h3>Portal Desainer</h3>
        <p class="login-sub">Masuk untuk mengelola pesananmu</p>
        <label class="field-label">Email</label>
        <input class="field-input" type="text" id="emailArtist" placeholder="nama@email.com">
        <div class="field-error" id="errorEmailArtist">Email wajib diisi.</div>
        <label class="field-label">Password</label>
        <input class="field-input" type="password" id="passwordArtist" placeholder="••••••••">
        <div class="field-error" id="errorPasswordArtist">Password wajib diisi.</div>
        <button class="full-btn" onclick="masukArtist()">Masuk sebagai Desainer</button>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="wrap">&copy; 2026 ForMark. All rights reserved.</div>
</footer>

<script>
function masukArtist(){
  const email = document.getElementById("emailArtist");
  const password = document.getElementById("passwordArtist");
  const errorEmail = document.getElementById("errorEmailArtist");
  const errorPassword = document.getElementById("errorPasswordArtist");
  let valid = true;

  if(email.value.trim() === ""){
    email.classList.add("invalid"); errorEmail.classList.add("visible"); valid = false;
  } else {
    email.classList.remove("invalid"); errorEmail.classList.remove("visible");
  }
  if(password.value.trim() === ""){
    password.classList.add("invalid"); errorPassword.classList.add("visible"); valid = false;
  } else {
    password.classList.remove("invalid"); errorPassword.classList.remove("visible");
  }

  if(valid){
    window.location.href = "dashboard-artist.html";
  }
}
</script>

</body>
</html>
