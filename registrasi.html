<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Akun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo-brand"><img src="logofm.png" alt="ForMark" class="logo-avatar"><span class="logo-name">ForMark</span></a>
        <ul class="navlinks">
      <li><a href="index.html">Beranda</a></li>
      <li><a href="katalog.html">Katalog</a></li>
      <li><a href="form-pemesanan.html">Transaksi</a></li>
      <li><a href="profil.html">Profil</a></li>
    </ul>
    <a class="navcta" href="login.html">Masuk</a>
  </div>
</nav>
</header>

<main>
<div class="device-page">
  <div class="screen-label">Registrasi akun</div>
  <div class="device">
    <div class="device-bar"><span></span><span></span><span></span></div>
    <div class="device-body">
      <div class="login-box">
        <h3>Buat akun baru</h3>
        <p class="login-sub">Daftar untuk mulai memesan logo brand-mu</p>

        <label class="field-label">Nama Lengkap</label>
        <input class="field-input" type="text" id="nama" placeholder="Nama kamu">
        <div class="field-error" id="error-nama">Nama wajib diisi.</div>

        <label class="field-label">Email</label>
        <input class="field-input" type="email" id="email" placeholder="nama@email.com">
        <div class="field-error" id="error-email">Email wajib diisi.</div>

        <label class="field-label">Password</label>
        <input class="field-input" type="password" id="password" placeholder="Min. 8 karakter">
        <div class="field-error" id="error-password">Password wajib diisi.</div>

        <label class="field-label">Konfirmasi Password</label>
        <input class="field-input" type="password" id="konfirmasi" placeholder="Ulangi password">
        <div class="field-error" id="error-konfirmasi">Konfirmasi password tidak sesuai.</div>

        <button class="full-btn" onclick="daftar()">Daftar Sekarang</button>
        <p class="switch-text">Sudah punya akun? <a href="login.html" style="color:var(--terracotta-dark);text-decoration:none;font-weight:600;">Masuk</a></p>
      </div>
    </div>
  </div>
</div>
</main>

<footer>
  <div class="wrap">&copy; 2026 ForMark. All rights reserved.</div>
</footer>

<script>
function daftar(){
  const nama = document.getElementById("nama");
  const email = document.getElementById("email");
  const password = document.getElementById("password");
  const konfirmasi = document.getElementById("konfirmasi");

  const errorNama = document.getElementById("error-nama");
  const errorEmail = document.getElementById("error-email");
  const errorPassword = document.getElementById("error-password");
  const errorKonfirmasi = document.getElementById("error-konfirmasi");

  let valid = true;

  [nama, email, password, konfirmasi].forEach(f => f.classList.remove("invalid"));
  [errorNama, errorEmail, errorPassword, errorKonfirmasi].forEach(e => e.classList.remove("visible"));

  if(nama.value.trim() === ""){ nama.classList.add("invalid"); errorNama.classList.add("visible"); valid = false; }
  if(email.value.trim() === ""){ email.classList.add("invalid"); errorEmail.classList.add("visible"); valid = false; }
  if(password.value.trim() === ""){ password.classList.add("invalid"); errorPassword.classList.add("visible"); valid = false; }

  if(konfirmasi.value.trim() === "" || password.value !== konfirmasi.value){
    konfirmasi.classList.add("invalid");
    errorKonfirmasi.classList.add("visible");
    valid = false;
  }

  if(!valid) return;

  localStorage.setItem("nama", nama.value.trim());
  localStorage.setItem("email", email.value.trim().toLowerCase());
  localStorage.setItem("password", password.value);

  alert("Registrasi berhasil!");
  window.location.href = "index2.html";
}
</script>

</body>
</html>
